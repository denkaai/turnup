[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-scheduled-functions"

[[scheduled-functions]]
  name = "keep-alive"
  schedule = "0 9 */3 * *"
